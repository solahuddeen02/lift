server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # health check ของ backend — ไว้เช็คจากภายนอก/cloudflared
    location = /health {
        proxy_pass http://backend:8000;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
