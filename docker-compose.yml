services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/lift.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - lift-data:/data

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  lift-data:
